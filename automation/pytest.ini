[pytest]
pythonpath = .
addopts = --html=reports/report.html --self-contained-html
markers =
    smoke: fast, high-value tests covering the critical path — run with -m smoke for quick feedback
    standard_user: tests using the standard (baseline) user account
    problem_user: tests using the problem_user account (broken images, sort, add/remove)
    error_user: tests using the error_user account (sort alert, add limit, remove disabled)
    visual_user: tests using the visual_user account (randomised prices, misaligned elements)
    performance_glitch_user: tests using the performance_glitch_user account (slow page load)
    defect: tests that assert known-broken behaviour as the expected outcome
